# 打 tag 时自动构建并创建 GitHub Release，附带 Obsidian 商店要求的三个二进制文件
# （main.js / manifest.json / styles.css）。tag 名必须与 manifest.json 的 version 完全一致，
# 不带 v 前缀（Obsidian 约定）。
name: Release

on:
    push:
        tags:
            - "*"

permissions:
    contents: write
    # 产物溯源证明（artifact attestation）所需：商店审核建议为发布产物提供可验证的构建来源。
    id-token: write
    attestations: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - name: 安装依赖
              run: npm ci
            - name: 构建
              run: npm run build
            - name: 产物溯源证明
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      main.js
                      manifest.json
                      styles.css
            - name: 创建 Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              # 说明文本优先取仓库内 doc/release-notes/<tag>.md（人写的双语说明，随代码入库可追溯）；
              # 没有该文件时回退到 --generate-notes 自动生成。
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  notes="doc/release-notes/$tag.md"
                  if [ -f "$notes" ]; then
                    gh release create "$tag" \
                      --title "$tag" \
                      --notes-file "$notes" \
                      main.js manifest.json styles.css
                  else
                    gh release create "$tag" \
                      --title "$tag" \
                      --generate-notes \
                      main.js manifest.json styles.css
                  fi
